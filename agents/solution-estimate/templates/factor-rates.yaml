# factor-rates.yaml -- the 103-factor catalogue with VS/S/M/C/VC hour rates.
# Source of truth per ADR-0009. 95 SI factors + 8 reintroduced = 103.
#
# Schema per factor entry:
#   <factor-key>:
#     name: "<human-readable factor name>"
#     category: <one of the 11 categories>
#     rates: { vs: <hrs|null>, s: <hrs|null>, m: <hrs|null>, c: <hrs|null>, vc: <hrs|null> }
#
# null means "rate undefined for this complexity in the canonical source -- do not assume 0".
# Per-project overrides: projects/{p}/_aggregator/estimation/factor-rates-override.yaml
#
# Validated implicitly by the /estimate command body. No JSON Schema in v1 (the catalogue is
# semantically rich enough that a schema would just check shape, not correctness).

version: 1

