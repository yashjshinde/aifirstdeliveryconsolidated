artifactType: entity
displayName: "Dataverse Table"
pattern: schema-asset
sourcePaths:
  - "Entities/*/Entity.xml"
extractors:
  name: "Entities/{name}/Entity.xml > Entity/EntityInfo/entity/Name"
  schemaName: "Entities/{name}/Entity.xml > Entity/EntityInfo/entity/SchemaName"
  displayName: "Entities/{name}/Entity.xml > Entity/EntityInfo/entity/EntitySetName"
  primaryAttribute: "Entities/{name}/Entity.xml > Entity/EntityInfo/entity/PrimaryNameAttribute"
  fields: "Entities/{name}/Entity.xml > Entity/EntityInfo/entity/attributes/attribute"
  oneToManyRelationships: "Entities/{name}/Entity.xml > Entity/EntityInfo/entity/OneToManyRelationships/OneToManyRelationship"
  manyToOneRelationships: "Entities/{name}/Entity.xml > Entity/EntityInfo/entity/ManyToOneRelationships/ManyToOneRelationship"
  manyToManyRelationships: "Entities/{name}/Entity.xml > Entity/EntityInfo/entity/ManyToManyRelationships/ManyToManyRelationship"
  alternateKeys: "EntityKeys/{name}*"
  auditEnabled: "Entities/{name}/Entity.xml > Entity/EntityInfo/entity/IsAuditEnabled"
  duplicateDetection: "Entities/{name}/Entity.xml > Entity/EntityInfo/entity/IsDuplicateCheckSupported"
crossRefs:
  - { type: plugin-step, link: "step.PrimaryEntityName == artifact.name" }
  - { type: form,        link: "form.ObjectTypeCode == artifact.name" }
  - { type: view,        link: "view.ReturnedTypeCode == artifact.name" }
  - { type: chart,       link: "chart.PrimaryEntityTypeCode == artifact.name" }
  - { type: bpf,         link: "bpf.PrimaryEntity == artifact.name" }
  - { type: flow,        link: "flow.trigger.entity == artifact.name" }
  - { type: security-role, link: "role.privileges[entity:artifact.name] != none" }
requires: []
validators:
  - validate_entity_field_dictionary
  - validate_evidence_chain
outputPath: "docs-generated/technical/data-model/entities/{name}.md"
