# work-items.yaml
# Generated by /plan — do not edit manually. Re-run /plan to regenerate.
# uid and alm-id fields are stable — /plan preserves them on re-run.
# Consumed by /alm extract and the external ALM Agent.

feature: {feature-name}
alm-tool: {alm-tool}           # from constitution/10-alm-configuration.md
generated-date: {YYYY-MM-DD}

work-items:

  # ── Level 1 — Business Capability (ALM type: Epic by default) ──────────────
  - id: EP-001
    uid: "{feature-name}-EP-001"   # stable unique identifier — never changes
    alm-id: null                   # set by /alm sync after ALM Agent creates the item
    level: 1
    alm-type: Epic
    title: "{Business capability title}"
    description: >
      {One to three sentences describing the business value delivered by this capability.}
    priority: High | Medium | Low
    fr-refs: [FR-001, FR-002]
    parent: null
    children: [FT-001, FT-002]

  # ── Level 2 — Functional Grouping (ALM type: Feature by default) ──────────
  - id: FT-001
    uid: "{feature-name}-FT-001"
    alm-id: null
    level: 2
    alm-type: Feature
    title: "{Functional grouping title}"
    description: >
      {One to two sentences describing the functional area covered.}
    priority: High | Medium | Low
    fr-refs: [FR-001]
    parent: EP-001
    children: [US-001]

  # ── Level 3 — Requirement Unit (ALM type: User Story by default) ──────────
  - id: US-001
    uid: "{feature-name}-US-001"
    alm-id: null
    level: 3
    alm-type: User Story
    title: "{User story title}"
    description: >
      As a {persona}, I want {action}, so that {business value}.
    acceptance-criteria:
      - "AC-001: {Testable criterion — positive}"
      - "AC-002: {Testable criterion — negative / edge case}"
    story-points: {1 | 2 | 3 | 5 | 8}
    priority: High | Medium | Low
    fr-refs: [FR-001]
    parent: FT-001
    children: [T-001, T-002]

  # ── Level 4 — Implementation Item (ALM type: Task by default) ─────────────
  - id: T-001
    uid: "{feature-name}-T-001"
    alm-id: null
    level: 4
    alm-type: Task
    title: "{Task title}"
    description: >
      {One to two sentences describing what must be built or configured.}
    acceptance-criteria:
      - "AC-001: {Testable criterion}"
    component-type: Plugin | WebResource | PCF | SchemaChange | Flow | Configuration
    complexity: S | M | L | XL
    priority: High | Medium | Low
    fr-refs: [FR-001]
    parent: US-001
    children: []
    status: TODO
    validation-status: NOT VALIDATED
    impl-doc-path: null
