# work-items.yaml
# Generated by /plan — do not edit manually. Re-run /plan to regenerate.
# uid and alm-id fields are stable — /plan preserves them on re-run.
# Consumed by /alm extract and the external ALM Agent.

feature: {feature-name}
alm-tool: {alm-tool}
generated-date: {YYYY-MM-DD}

work-items:

  - id: EP-001
    uid: "{feature-name}-EP-001"
    alm-id: null
    level: 1
    alm-type: Epic
    title: "{Business capability title}"
    description: >
      {One to three sentences describing the Power Platform solution and business value.}
    priority: High | Medium | Low
    fr-refs: [FR-001, FR-002]
    parent: null
    children: [FT-001, FT-002]

  - id: FT-001
    uid: "{feature-name}-FT-001"
    alm-id: null
    level: 2
    alm-type: Feature
    title: "{Functional grouping title — e.g., Data Model, App UI, Automation, Copilot, Security}"
    description: >
      {One to two sentences describing the Power Platform layer covered.}
    priority: High | Medium | Low
    fr-refs: [FR-001]
    parent: EP-001
    children: [US-001]

  - id: US-001
    uid: "{feature-name}-US-001"
    alm-id: null
    level: 3
    alm-type: User Story
    title: "{User story title}"
    description: >
      As a {persona}, I want {action}, so that {business value}.
    acceptance-criteria:
      - "AC-001: {Testable criterion — happy path}"
      - "AC-002: {Testable criterion — edge case or delegation scenario}"
    story-points: {1 | 2 | 3 | 5 | 8}
    priority: High | Medium | Low
    fr-refs: [FR-001]
    parent: FT-001
    children: [T-001, T-002]

  - id: T-001
    uid: "{feature-name}-T-001"
    alm-id: null
    level: 4
    alm-type: Task
    title: "{Task title}"
    description: >
      {One to two sentences describing what must be built or configured.}
    acceptance-criteria:
      - "AC-001: {Testable criterion}"
    component-type: CanvasApp | ModelDrivenApp | Flow | CopilotTopic | DataverseSchema | SecurityRole | Configuration
    complexity: S | M | L | XL
    priority: High | Medium | Low
    fr-refs: [FR-001]
    parent: US-001
    children: []
    status: TODO
    validation-status: NOT VALIDATED
    impl-doc-path: null
